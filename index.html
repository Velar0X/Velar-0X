<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Velar 0X</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Cinematic Filter Wrapper */
#cinematic-filter {
    position: relative;
    width: 100%;
    height: 100%;
    filter: contrast(1.07) brightness(0.94) saturate(0.95);
}

/* Vignette */
#cinematic-filter::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    box-shadow: inset 0 0 250px rgba(0,0,0,0.55);
}

/* SYMBOL */
#symbol {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('symbol.png') no-repeat center center;
    background-size: cover;
    z-index: 1;
    animation: breathe 20s ease-in-out infinite;
}

@keyframes breathe {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

/* Lichtpuls */
#light {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
    animation: pulseLight 15s infinite;
    z-index: 2;
}

@keyframes pulseLight {
    0% { opacity: 0.2; }
    50% { opacity: 0.4; }
    100% { opacity: 0.2; }
}

/* Grain Overlay */
#grain {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    z-index: 4;
    pointer-events: none;
}

/* TEXT LINKS / RECHTS */
#name-left, #name-right {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    z-index: 3;
    font-weight: bold;
    white-space: nowrap; /* verhindert Zeilenumbruch */
}

/* Velar komplett links vom Kreis */
#name-left {
    left: 5%; /* Abstand vom linken Rand */
    font-size: 90px;
}

/* Rechts 0X */
#name-right {
    right: 5%;
    font-size: 90px;
}

/* Responsive Textgrößen */
@media (max-width: 1024px) {
    #name-left, #name-right { font-size: 70px; }
}

@media (max-width: 768px) {
    #name-left, #name-right { font-size: 50px; }
}

@media (max-width: 480px) {
    #name-left, #name-right { font-size: 35px; }
}

/* Hinweis */
#hint {
    display: none;
    position: fixed;
    bottom: 50px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: white;
    z-index: 5;
}
</style>
</head>

<body>
<div id="cinematic-filter">

<div id="symbol"></div>
<div id="light"></div>
<div id="grain"></div>

<!-- Velar als zusammenhängendes Wort -->
<div id="name-left">Velar</div>
<div id="name-right">0X</div>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<audio id="background-sound" src="ticking.mp3" loop></audio>

<script>
const audio = document.getElementById("background-sound");

// Erstes Klick-Event: Sound + Vollbild
document.body.addEventListener("click", () => {
    audio.play();
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch((err) => {
            console.log("Vollbild konnte nicht gestartet werden: " + err.message);
        });
    }
}, { once: true });

// Tick-Impuls Effekt
audio.addEventListener("timeupdate", () => {
    if (Math.floor(audio.currentTime) % 2 === 0) {
        const right = document.getElementById("name-right");
        right.style.transform = "translateY(-50%) scale(1.04)";
        setTimeout(() => {
            right.style.transform = "translateY(-50%) scale(1)";
        }, 120);
    }
});

// Text-Flackern alle 25 Sekunden
setInterval(() => {
    const left = document.getElementById("name-left");
    const right = document.getElementById("name-right");

    left.style.opacity = "0.75";
    right.style.opacity = "0.75";

    setTimeout(() => {
        left.style.opacity = "1";
        right.style.opacity = "1";
    }, 120);

}, 25000);

// Hinweis nur 22–0 Uhr
const now = new Date();
const hour = now.getHours();
if (hour >= 22 && hour < 24) {
    document.getElementById("hint").style.display = "block";
}

// Mini-Glitch-Effekt
function triggerGlitch() {
    const symbol = document.getElementById("symbol");
    const left = document.getElementById("name-left");
    const right = document.getElementById("name-right");

    symbol.style.transform = "scale(1.02) translateX(1px)";
    left.style.transform = "translateY(-50%) translateX(-1px)";
    right.style.transform = "translateY(-50%) translateX(1px)";

    setTimeout(() => {
        symbol.style.transform = "scale(1.02) translateX(0)";
        left.style.transform = "translateY(-50%)";
        right.style.transform = "translateY(-50%)";
    }, 500);
}

// Zufällige Glitchs alle 20–60 Sekunden
function scheduleGlitch() {
    const randomTime = Math.random() * (60000 - 20000) + 20000;
    setTimeout(() => {
        triggerGlitch();
        scheduleGlitch();
    }, randomTime);
}
scheduleGlitch();

</script>

</div>
</body>
</html>
