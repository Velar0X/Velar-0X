<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velar 0X</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        #symbol {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('symbol.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        #name {
            position: absolute;
            bottom: 50px;          /* Abstand vom unteren Rand */
            width: 100%;
            display: flex;
            justify-content: space-between;  /* Velar links, 0X rechts */
            padding: 0 50px;       /* Abstand zu den Seiten */
            font-size: 48px;
            letter-spacing: 2px;
            color: white;
            z-index: 2;
        }

        #hint {
            display: none;
            position: absolute;
            bottom: 120px;        /* etwas über dem Namen */
            width: 100%;
            font-size: 24px;
            z-index: 2;
        }
    </style>
</head>
<body>

<div id="symbol"></div>

<div id="name">
    <span id="left">Velar</span>
    <span id="right">0X</span>
</div>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<script>
    const now = new Date();
    const hour = now.getHours();

    if (hour >= 22) {
        document.getElementById("hint").style.display = "block";
    }
</script>

</body>
</html>
