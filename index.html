<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velar 0X</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Symbol fullscreen */
        #symbol {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('symbol.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Name unten links/rechts */
        #name {
            position: fixed;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            font-size: 48px;
            color: white;
            z-index: 2;
        }

        /* Hinweis */
        #hint {
            display: none;
            position: fixed;
            bottom: 120px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: white;
            z-index: 2;
        }
    </style>
</head>
<body>

<div id="symbol"></div>

<div id="name">
    <span>Velar</span>
    <span>0X</span>
</div>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<script>
    const now = new Date();
    const hour = now.getHours();

    if (hour >= 22) {
        document.getElementById("hint").style.display = "block";
    }
</script>

</body>
</html>
