<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velar 0X</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            flex-direction: column;
        }

        #symbol {
            width: 100vw;
            height: 100vh;
            background: url('symbol.png') no-repeat center center;
            background-size: contain; /* Symbol skalieren, ohne verzerrt zu werden */
        }

        h1 {
            position: absolute;
            top: 50%;
            width: 100%;
            transform: translateY(150px); /* Name leicht unterhalb des Symbols */
            font-size: 48px;
            letter-spacing: 2px;
            color: white;
        }

        #hint {
            display: none;
            position: absolute;
            bottom: 50px;
            width: 100%;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div id="symbol"></div>

<h1>Velar 0X</h1>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<script>
    const now = new Date();
    const hour = now.getHours();

    if (hour >= 22) {
        document.getElementById("hint").style.display = "block";
    }
</script>

</body>
</html>
