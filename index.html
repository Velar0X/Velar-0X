<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velar 0X</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* verhindert Scrollbalken */
            background-color: black;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        #symbol {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('symbol.png') no-repeat center center;
            background-size: cover; /* Symbol füllt die ganze Seite */
            z-index: 1;
        }

        h1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            letter-spacing: 2px;
            z-index: 2;
            margin: 0;
        }

        #hint {
            display: none;
            position: absolute;
            bottom: 50px;
            width: 100%;
            font-size: 24px;
            z-index: 2;
        }
    </style>
</head>
<body>

<div id="symbol"></div>

<h1>Velar 0X</h1>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<script>
    const now = new Date();
    const hour = now.getHours();

    if (hour >= 22) {
        document.getElementById("hint").style.display = "block";
    }
</script>

</body>
</html>
