<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Velar 0X</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Symbol fullscreen */
        #symbol {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('symbol.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Name links/rechts mittig vertikal */
        #name-left, #name-right {
            position: fixed;
            top: 50%; /* vertikal mittig */
            transform: translateY(-50%);
            font-size: 80px; /* Größe anpassen */
            color: white;
            z-index: 2;
        }

        #name-left {
            left: 50px; /* Abstand vom linken Rand */
        }

        #name-right {
            right: 50px; /* Abstand vom rechten Rand */
        }

        /* Hinweis */
        #hint {
            display: none;
            position: fixed;
            bottom: 50px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            color: white;
            z-index: 2;
        }
    </style>
</head>
<body>

<div id="symbol"></div>

<div id="name-left">Velar</div>
<div id="name-right">0X</div>

<div id="hint">
    <p>Phase 1 aktiv.</p>
    <p>Iteration beginnt.</p>
</div>

<script>
    const now = new Date();
    const hour = now.getHours();

    if (hour >= 22) {
        document.getElementById("hint").style.display = "block";
    }
</script>

</body>
</html>
