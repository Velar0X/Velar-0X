<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Velar 0X</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background-color: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Cinematic Filter Wrapper */
#cinematic-filter {
    position: relative;
    width: 100%;
    height: 100%;
    filter: contrast(1.07) brightness(0.94) saturate(0.95);
}

/* Vignette */
#cinematic-filter::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    box-shadow: inset 0 0 250px rgba(0,0,0,0.55);
}

/* SYMBOL */
#symbol {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('symbol.png') no-repeat center center;
    background-size: cover;
    z-index: 1;
    animation: breathe 20s ease-in-out infinite;
}

@keyframes breathe {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

/* Lichtpuls */
#light {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
    animation: pulseLight 15s infinite;
    z-index: 2;
}

@keyframes pulseLight {
    0% { opacity: 0.2; }
    50% { opacity: 0.4; }
    100% { opacity: 0.2; }
}
